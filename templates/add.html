{% extends "layout.html" %}

{% block title %}Add Expense{% endblock %}

{% block main %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card form-card">
            <div class="card-body p-4">
                <h3 class="card-title mb-4"><i class="bi bi-plus-circle"></i> Add Expense</h3>
                <form method="post">
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount ($)</label>
                        <div class="input-group input-group-lg">
                            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
                            <input type="number" class="form-control" id="amount" name="amount"
                                   step="0.01" min="0.01" placeholder="0.00" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">Category</label>
                        <select class="form-select form-select-lg" id="category" name="category" required>
                            <option value="" disabled selected>Select a category</option>
                            {% for cat in categories %}
                            <option value="{{ cat }}">{{ cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Description <span class="text-muted">(optional)</span></label>
                        <input type="text" class="form-control form-control-lg" id="description" name="description"
                               placeholder="e.g., Lunch at cafe">
                    </div>
                    <div class="mb-4">
                        <label for="date" class="form-label">Date</label>
                        <input type="date" class="form-control form-control-lg" id="date" name="date" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-check-lg"></i> Save Expense
                        </button>
                        <a href="/" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Default date to today
    document.getElementById('date').valueAsDate = new Date();
</script>
{% endblock %}
